<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音视频系统拓扑图 - 交互可视化</title></title><script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.34.0/cytoscape.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#1a1a2e;color:#eee;overflow:hidden;font-size:14px}
#header{background:#16213e;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #0f3460;flex-wrap:wrap;gap:6px}
#header h1{font-size:16px;color:#e94560;white-space:nowrap}
#tabs{display:flex;gap:3px}
#tabs .tab{padding:5px 12px;background:#0f3460;color:#aaa;border:none;border-radius:4px;cursor:pointer;font-size:12px}
#tabs .tab.active{background:#e94560;color:#fff}
#toolbar{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
#toolbar button{padding:5px 10px;background:#0f3460;color:#ccc;border:1px solid #1a5276;border-radius:4px;cursor:pointer;font-size:12px;white-space:nowrap}
#toolbar button.active{background:#e94560;color:#fff;border-color:#e94560}
#toolbar button:hover{background:#1a5276}
#toolbar .status{font-size:12px;color:#f0c040;margin-left:6px;padding:4px 8px;background:#0f346080;border-radius:4px}
#main{display:flex;height:calc(100vh - 46px)}
#cy{flex:1;height:100%}
#info-panel{width:280px;background:#16213e;padding:12px;overflow-y:auto;border-left:2px solid #0f3460;font-size:13px}
#info-panel h3{color:#e94560;margin:8px 0 6px;padding-bottom:3px;border-bottom:1px solid #0f3460;font-size:14px}
.path-info{margin:3px 0;padding:5px 8px;background:#0f3460;border-radius:4px;font-size:12px}
.path-info .label{color:#888;font-size:11px}
.path-info .val{color:#eee;font-size:12px}
.legend{margin-top:10px;padding:8px;background:#0f3460;border-radius:6px}
.legend-item{display:flex;align-items:center;gap:6px;margin:3px 0;font-size:11px;color:#ccc}
.legend-item .line{width:24px;height:3px;border-radius:2px;flex-shrink:0}
.legend-item .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
@media(max-width:768px){#info-panel{width:180px}}
</style>
</head>
<body>

<div id="header">
<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
<h1>音视频系统拓扑图</h1>
<span style="font-size:11px;color:#888">ATEM Constellation 8K - 完整系统</span>
</div>
<div id="tabs">
<button class="tab active" data-view="video">视频系统</button>
<button class="tab" data-view="ob">OB系统</button>
<button class="tab" data-view="audio">音频系统</button>
<button class="tab" data-view="fiber">光纤系统</button>
</div>
<div id="toolbar">
<button id="btn-start">1.选起点</button>
<button id="btn-end">2.选终点</button>
<button id="btn-clear">清除</button>
<span class="status" id="status">点击选起点- 点设备</span>
</div>
</div>
<div id="main"><div id="cy"></div>
<div id="info-panel">
<h3>设备信息</h3>
<div id="device-info"><p style="color:#888;padding:6px;font-size:12px">点击设备查看详情</p></div>
<div id="path-display"></div>
<div class="legend">
<div style="font-weight:bold;margin-bottom:5px;color:#e94560;font-size:13px">图例</div>
<div class="legend-item"><span class="line" style="background:#2ecc71"></span> 输入信号信彿(SDI)</div>
<div class="legend-item"><span class="line" style="background:#e74c3c"></span> 输出信号信彿(SDI)</div>
<div class="legend-item"><span class="line" style="background:#f39c12"></span> HDMI信号信彿</div>
<div class="legend-item"><span class="line" style="background:#3498db"></span> 光纤/网络</div>
<div class="legend-item"><span class="line" style="background:#9b59b6"></span> Dante音频</div>
<div class="legend-item"><span class="dot" style="background:#e94560"></span> 中心矩阵</div>
<div class="legend-item"><span class="dot" style="background:#27ae60"></span> 摄像机</div>
<div class="legend-item"><span class="dot" style="background:#e67e22"></span> 输出设备</div>
<div class="legend-item"><span class="dot" style="background:#8e44ad"></span> 音频设备</div>
<div class="legend-item"><span class="dot" style="background:#2c3e50"></span> 转换处理</div>
</div></div></div>

<script>
var NODES=[],EDGES=[],POS={};
var CO={inp:"#2ecc71",out:"#e74c3c",hdmi:"#f39c12",fib:"#3498db",aud:"#9b59b6"};
var NC={cen:"#e94560",cam:"#27ae60",inp:"#2ecc71",out:"#e67e22",con:"#2c3e50",aud:"#8e44ad"};
function aN(i,l,d,g){NODES.push({i:i,l:l,d:d,g:g});}
function aE(i,s,t,tp,lb,de){EDGES.push({i:i,s:s,t:t,tp:tp,lb:lb,de:de});}
function aP(i,x,y){POS[i]={x:x,y:y};}
aN("MS","ATEM Constellation 8K","中心矩阵 INPUT:40 OUTPUT:24 M/E:4","cen");
aN("OB","ATEM TV Studio Pro 4K","OB现场切换台 8路SDI","cen");
for(var i=1;i<=6;i++){aN("C"+i,"CAM-"+i+"\nSONY 4300","摄像机"+i,"cam");aN("U"+i,"HDCU4300","CCU"+i,"cam");}
aN("VR","VCR","录像机","inp");aN("CG","CG","字幕机","inp");aN("RP","REPLAY","回放系统","inp");
aN("O1","OBS PC #1","直播电脑1","inp");aN("O2","OBS PC #2","直播电脑2","inp");aN("O3","OBS PC #3","直播电脑3","inp");
aN("PH","手机-OB-1","手机信号","inp");aN("L1","LIVE PC #1","直播1 延迟","inp");aN("L2","LIVE PC #2","直播2 延迟","inp");
aN("DV","DeckLink 8K VCR","VCR采集卡,"con");aN("DC","DeckLink 8K CG","CG采集卡,"con");aN("DR","DeckLink 8K RP","回放采集卡,"con");
aN("DO1","DeckLink 8K O1","OBS1采集卡,"con");aN("DO2","DeckLink 8K O2","OBS2采集卡,"con");aN("DO3","DeckLink 8K O3","OBS3采集卡,"con");
aN("P1","POV-#1","POV摄像机","cam");aN("P2","POV-#2","POV摄像机","cam");aN("P3","POV-#3","POV摄像机","cam");aN("P4","POV-#4","POV摄像机","cam");
aN("CP","Converter #1","手机 HDMI to SDI","con");
aN("D1","BMD 视分 #1","SDI分配1","out");aN("D2","BMD 视分 #2","SDI分配2","out");aN("D3","BMD 视分 #3","SDI分配3","out");
aN("DL","延迟器","视频延迟器","out");aN("R1","录机 #1","节目录制1","out");aN("R2","录机 #2","节目录制2","out");
aN("RL","RED LINK","RED LINK输出","out");
aN("RE1","加解嵌1","ROSS opengear 1","con");aN("RE2","加解嵌2","ROSS opengear 2","con");
aN("AJ","AJA 12G","AJA 12G-SDI","con");aN("SO","SOUM 19","音频监听","out");aN("MO","监视器","技术监视器","out");
aN("MC1","Micro Conv 1","SDI->HDMI->TV1","con");aN("MC2","Micro Conv 2","SDI->HDMI->TV2","con");aN("MC3","Micro Conv 3","SDI->HDMI->OB TV","con");
aN("MV1","TV1 8K-MV1","8K多画面?","out");aN("MV2","TV2 8K-MV2","8K多画面?","out");aN("MV3","TV3 OB SW-MV1","OB多画面","out");
aN("YC","Yamaha CL1","16推子调音台 Dante","aud");aN("TI","TIO1608","音频接口箱 16入8出","aud");aN("IC","ICON耳放","四声道耳机放大器","aud");
aN("SL","音响-L","左声道","aud");aN("SR","音响-R","右声道","aud");aN("PL","PA-L","扩声左","aud");aN("PR","PA-R","扩声右","aud");
aN("ER","耳返","返听系统","aud");aN("M1","MIC #1","话筒1","aud");aN("M2","MIC #2","话筒2","aud");aN("CM","CUE MIC","导播话筒","aud");
aN("BG","BGM","背景音乐","aud");aN("PA","PC(音频)","音频电脑","aud");aN("UR","UR242声卡","OBS3 USB声卡","aud");
aN("FT","光发 #1","光纤发送器","con");aN("FR","光收","光纤接收器","con");aN("FI","POV光纤 I/O","POV光纤I/O","con");
aN("OG1","OB-PGM-1","OB主出1->SW IN13","out");aN("OG2","OB-PGM-2","OB主出2->SW IN14","out");aN("OG3","OB-PGM-3","OB主出3->REPLAY","out");

// Edges
for(var i=1;i<=6;i++){aE("c"+i,"C"+i,"U"+i,"fib","光纤","12G-SDI+LAN");aE("m"+i,"U"+i,"MS","inp","SDI IN SLOT-"+i,"");}
aE("v1","VR","DV","hdmi","HDMI","");aE("v2","DV","MS","inp","SDI OUT VCR","");
aE("g1","CG","DC","hdmi","HDMI","");aE("g2","DC","MS","inp","SDI OUT CG","");
aE("r1","RP","DR","hdmi","HDMI","");aE("r2","DR","MS","inp","SDI OUT RP","");
for(var i=1;i<=3;i++){aE("o"+i,"O"+i,"DO"+i,"hdmi","HDMI","");aE("oi"+i,"DO"+i,"MS","inp","SDI OUT","");}
aE("x1","MS","D1","out","SLOT-1 PGM-1","");aE("x2","MS","D2","out","SLOT-2 PGM-2","");aE("x3","MS","D3","out","SLOT-3 PGM-3","");
aE("x4","MS","DL","out","SLOT-4 PGM-9","");aE("x5","MS","R1","out","SLOT-5","");aE("x6","MS","R2","out","SLOT-6","");
aE("x7","MS","RL","out","SLOT-7","");aE("x8","MS","RE1","out","TO-ROSS #1","");aE("x9","MS","RE2","out","TO-ROSS #2","");
aE("x10","MS","AJ","out","TO-AJA 12G","");aE("x11","MS","SO","out","TO-SOUM 19","");aE("x12","MS","MO","out","PGM-4 监视器","");
aE("d1","DL","L1","out","DELAY-PGM #1","");aE("d2","DL","L2","out","DELAY-PGM #2","");
aE("a1","D1","MC1","out","SDI OUT","");aE("a2","MC1","MV1","hdmi","HDMI->TV1","");
aE("a3","D2","MC2","out","SDI OUT","");aE("a4","MC2","MV2","hdmi","HDMI->TV2","");
aE("b1","PH","CP","hdmi","HDMI","");aE("b2","CP","OB","inp","SDI IN","");
aE("b3","P1","OB","inp","SDI IN","");aE("b4","P2","OB","inp","SDI IN","");aE("b5","P3","OB","inp","SDI IN","");aE("b6","P4","OB","inp","SDI IN","");
aE("b7","OB","OG1","out","PGM01->SW IN13","");aE("b8","OB","OG2","out","PGM02->SW IN14","");
aE("b9","OB","OG3","out","PGM03->REPLAY","");aE("b10","OB","MC3","out","MV OUT","");aE("b11","MC3","MV3","hdmi","HDMI->OB TV","");
aE("e1","RE1","YC","aud","AUDIO O/P 1-4","");aE("e2","RE2","YC","aud","AUDIO O/P 1-4","");
aE("f1","YC","TI","aud","Dante Pri/Sec","");aE("f2","YC","IC","aud","CH A-D OUT","");
aE("f3","YC","SL","aud","L","");aE("f4","YC","SR","aud","R","");aE("f5","YC","PL","aud","PA L","");aE("f6","YC","PR","aud","PA R","");aE("f7","YC","ER","aud","AUX","");
aE("f8","M1","YC","aud","MIC 01","");aE("f9","M2","YC","aud","MIC 02","");aE("f10","CM","YC","aud","MIC 03","");
aE("f11","BG","YC","aud","LINE IN","");aE("f12","PA","YC","aud","LINE IN","");
aE("f13","O3","UR","aud","USB3.0","");aE("f14","UR","YC","aud","AUDIO I/P","");
aE("g1","FT","FR","fib","光纤链路","");aE("g2","FT","FI","fib","I/O 6-1","");
aE("g3","FI","P1","out","POV-1","");aE("g4","FI","P2","out","POV-2","");aE("g5","FI","P3","out","POV-3","");aE("g6","FI","P4","out","POV-4","");

// Positions
aP("MS",0,0);
for(var i=1;i<=6;i++){aP("C"+i,-480,-260+(i-1)*100);aP("U"+i,-430,-180+(i-1)*100);}
aP("VR",-320,-220);aP("DV",-180,-220);aP("CG",-320,-140);aP("DC",-180,-140);
aP("RP",-320,-60);aP("DR",-180,-60);aP("O1",-320,20);aP("DO1",-180,20);
aP("O2",-320,100);aP("DO2",-180,100);aP("O3",-320,180);aP("DO3",-180,180);
aP("D1",200,-220);aP("D2",200,-140);aP("D3",200,-60);aP("DL",200,20);
aP("R1",200,100);aP("R2",200,180);aP("RL",200,260);
aP("RE1",380,-200);aP("RE2",380,-120);aP("AJ",380,-40);aP("SO",380,40);aP("MO",380,120);
aP("MC1",500,-260);aP("MV1",600,-260);aP("MC2",500,-160);aP("MV2",600,-160);
aP("MC3",500,-60);aP("MV3",600,-60);aP("L1",380,200);aP("L2",380,280);
aP("OB",-600,80);aP("PH",-750,-20);aP("CP",-680,30);
aP("OG1",-700,-120);aP("OG2",-700,-40);aP("OG3",-700,40);
aP("P1",-750,180);aP("P2",-750,240);aP("P3",-750,300);aP("P4",-750,360);
aP("FT",-850,180);aP("FR",-900,280);aP("FI",-800,280);
aP("YC",600,80);aP("TI",750,-20);aP("IC",750,60);
aP("SL",750,140);aP("SR",750,200);aP("PL",750,260);aP("PR",750,320);aP("ER",750,380);
aP("M1",750,-100);aP("M2",750,-60);aP("CM",750,-20);aP("BG",750,-180);aP("PA",750,-140);
aP("UR",500,260);

// Short names for display
var SN={MS:"MAIN-SW\nConstellation 8K",OB:"OB-SW\nATEM 4K",C1:"CAM-1\nSONY 4300",C2:"CAM-2\nSONY 4300",C3:"CAM-3\nSONY 4300",C4:"CAM-4\nSONY 4300",C5:"CAM-5\nSONY 4300",C6:"CAM-6\nSONY 4300",U1:"CCU-1\nHDCU4300",U2:"CCU-2\nHDCU4300",U3:"CCU-3\nHDCU4300",U4:"CCU-4\nHDCU4300",U5:"CCU-5\nHDCU4300",U6:"CCU-6\nHDCU4300",
VR:"VCR\n录像机",CG:"CG\n字幕机",RP:"REPLAY\n回放",
O1:"OBS PC #1",O2:"OBS PC #2",O3:"OBS PC #3",
PH:"手机-OB-1",L1:"LIVE PC #1",L2:"LIVE PC #2",
DV:"DeckLink\n8K VCR",DC:"DeckLink\n8K CG",DR:"DeckLink\n8K RP",
DO1:"DeckLink\nOBS1",DO2:"DeckLink\nOBS2",DO3:"DeckLink\nOBS3",
P1:"POV-#1",P2:"POV-#2",P3:"POV-#3",P4:"POV-#4",CP:"Converter #1",
D1:"BMD 视分 #1",D2:"BMD 视分 #2",D3:"BMD 视分 #3",DL:"延迟器",R1:"录机 #1",R2:"录机 #2",RL:"RED LINK",
RE1:"加解嵌1\nROSS",RE2:"加解嵌2\nROSS",AJ:"AJA 12G",SO:"SOUM 19",MO:"监视器",
MC1:"Micro\nConv 1",MC2:"Micro\nConv 2",MC3:"Micro\nConv 3",
MV1:"TV1\n8K-MV1",MV2:"TV2\n8K-MV2",MV3:"TV3\nOB MV",
YC:"Yamaha\nCL1",TI:"TIO1608",IC:"ICON耳放",
SL:"音响 L",SR:"音响 R",PL:"PA L",PR:"PA R",ER:"耳返",
M1:"MIC #1",M2:"MIC #2",CM:"CUE MIC",BG:"BGM",PA:"PC音频",UR:"UR242",
FT:"光发 #1",FR:"光收",FI:"POV\n光纤I/O",
OG1:"OB-PGM-1",OG2:"OB-PGM-2",OG3:"OB-PGM-3"};

var VIEWS={vid:["MS","C1","U1","C2","U2","C3","U3","C4","U4","C5","U5","C6","U6","VR","DV","CG","DC","RP","DR","O1","DO1","O2","DO2","O3","DO3","D1","D2","D3","DL","R1","R2","RL","RE1","RE2","AJ","SO","MO","MC1","MC2","MC3","MV1","MV2","MV3","L1","L2"],
ob:["OB","PH","CP","P1","P2","P3","P4","OG1","OG2","OG3","RP","MS","MV3"],
aud:["YC","TI","IC","SL","SR","PL","PR","ER","M1","M2","CM","BG","PA","RE1","RE2","UR","O3"],
fib:["FT","FR","FI","P1","P2","P3","P4"]};
var TN={cen:"中心矩阵",cam:"摄像机",inp:"输入设备",out:"输出设备",con:"转换/处理",aud:"音频设备"};

var cy,st=null,en=null,mode="n";

function init(v){
 var ids=VIEWS[v]||VIEWS.vid;
 if(cy){cy.destroy();}
 var els=[];
 ids.forEach(function(id){
  var n=NODES.find(function(x){return x.i===id});
  if(n){els.push({data:{id:id,lb:SN[id]||n.l,de:n.d,gr:n.g},position:POS[id]||{x:0,y:0}});}
 });
 EDGES.forEach(function(e){
  if(ids.indexOf(e.s)>-1&&ids.indexOf(e.t)>-1){els.push({data:{id:e.i,source:e.s,target:e.t,tp:e.tp,lb:e.lb,de:e.de}});}
 });
 cy=cytoscape({container:document.getElementById("cy"),elements:els,
  style:[
   {selector:"node",style:{"text-valign":"center","text-halign":"center","font-size":"11px","color":"#fff","text-wrap":"wrap","border-width":2,"border-color":"#fff","width":56,"height":56,"background-color":function(x){return NC[x.data("gr")]||"#555"},"label":function(x){return x.data("lb")}}},
   {selector:'node[gr="cen"]',style:{width:80,height:66,"font-size":"12px","border-width":3,"border-color":"#ff7979"}},
   {selector:'node[gr="con"]',style:{width:46,height:46}},{selector:'node[gr="aud"]',style:{width:50,height:50}},
   {selector:"edge",style:{width:2.5,"curve-style":"bezier","line-color":function(x){return CO[x.data("tp")]||"#666"},"target-arrow-color":function(x){return CO[x.data("tp")]||"#666"},"target-arrow-shape":"triangle","label":function(x){return x.data("lb")},"font-size":"9px","color":"#aaa","text-background-color":"rgba(0,0,0,0.75)","text-background-opacity":1,"text-background-padding":"2px","text-rotation":"autorotate"}},
   {selector:".ph",style:{"line-color":"#ffd700","target-arrow-color":"#ffd700",width:5,"z-index":10}},
   {selector:".pn",style:{"border-color":"#ffd700","border-width":4,"shadow-blur":12,"shadow-color":"#ffd700","shadow-opacity":0.7}},
   {selector:".hv",style:{"border-color":"#00d2ff","border-width":3,"shadow-blur":10,"shadow-color":"#00d2ff","shadow-opacity":0.5}}
  ],layout:{name:"preset"},zoom:0.6,pan:{x:120,y:200}
 });
 cy.on("tap","node",function(ev){
  var n=ev.target;
  if(mode==="ss"){mode="n";st=n;en=null;cy.elements().removeClass("ph pn");n.addClass("pn");stat("已选起点，请点击[选终点]");document.getElementById("btn-start").classList.remove("active");document.getElementById("btn-end").classList.add("active");
  }else if(mode==="se"&&st&&n.id()!==st.id()){mode="n";en=n;n.addClass("pn");stat("");document.getElementById("btn-end").classList.remove("active");doPath();
  }else{showInfo(n);}
 });
 cy.on("mouseover","node",function(ev){ev.target.addClass("hv");showInfo(ev.target);});
 cy.on("mouseout","node",function(ev){ev.target.removeClass("hv");});
}

function doPath(){
 if(!st||!en)return;
 cy.elements().removeClass("ph pn");
 try{
  var d=cy.elements().dijkstra({root:"#"+st.id(),directed:true,weight:function(){return 1}});
  var p=d.pathTo(cy.getElementById(en.id()));
  if(p&&p.length>0){
   p.addClass("ph pn");
   var pd=document.getElementById("path-display");
   var nl=p.filter("node"),el=p.filter("edge");
   var h="<h3>路径详情</h3><div class=\"path-info\"><div class=\"label\">路径 ("+nl.length+"节点 "+el.length+"段)?</div><div class=\"val\">";
   nl.forEach(function(n,i){h+=SN[n.id()]?(SN[n.id()].replace(/\\n/g,"")):n.data("lb")+(i<nl.length-1?" <span style=\"color:#f39c12\">-></span> ":"");});
   h+="</div></div>";
   el.forEach(function(e){
    var s=SN[cy.getElementById(e.data("source")).id()]||cy.getElementById(e.data("source")).data("lb");
    var t=SN[cy.getElementById(e.data("target")).id()]||cy.getElementById(e.data("target")).data("lb");
    var c=CO[e.data("tp")]||"#666";
    var tn={inp:"输入",out:"输出",hdmi:"HDMI",fib:"光纤",aud:"音频"}[e.data("tp")]||"";
    h+="<div class=\"path-info\"><span style=\"color:"+c+'">鈼?</span> <b>'+s+"</b> -> <b>"+t+"</b><br><span style=\"color:#aaa;font-size:11px\">"+tn+" | "+e.data("lb")+"</span></div>";
   });
   pd.innerHTML=h;cy.fit(p,60);
  }else{pd.innerHTML="<h3>路径查询</h3><div class=\"path-info\" style=\"color:#e74c3c\">未找到连通路径</div>";}
 }catch(e){document.getElementById("path-display").innerHTML="<h3>路径查询</h3><div class=\"path-info\" style=\"color:#e74c3c\">路径计算错误</div>";}
}

function showInfo(n){
 var nd=NODES.find(function(x){return x.i===n.id()});
 if(!nd)return;
 var di=document.getElementById("device-info");
 var lb=SN[nd.i]||nd.l;
 var h="<div class=\"path-info\"><div class=\"label\">设备</div><div class=\"val\"><b>"+lb.replace(/\\n/g,"<br>")+'</b></div><div class="label" style="margin-top:4px">说明</div><div class="val">'+(nd.d||"-")+'</div><div class="label" style="margin-top:4px">类型</div><div class="val">'+(TN[nd.g]||nd.g)+"</div></div>";
 var conn=n.connectedEdges();
 if(conn.length>0){
  h+='<div style="margin-top:6px;font-size:12px;color:#ccc"><b>连接 ('+conn.length+"):</b></div>";
  conn.forEach(function(e){
   var oid=e.data("source")===n.id()?e.data("target"):e.data("source");
   var o=SN[oid]||NODES.find(function(x){return x.i===oid});
   if(o){var dir=e.data("source")===n.id()?"->":"<-";var c=CO[e.data("tp")]||"#666";h+="<div class=\"path-info\"><span style=\"color:"+c+'">鈼?</span> '+dir+" "+(o.lb||o)+'<br><span style="color:#888;font-size:10px">'+e.data("lb")+"</span></div>";}
  });
 }
 di.innerHTML=h;
}

function setup(){
 document.querySelectorAll(".tab").forEach(function(t){
  t.addEventListener("click",function(){
   document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});
   this.classList.add("active");clr();init(this.dataset.view);
  });
 });
 document.getElementById("btn-start").addEventListener("click",function(){clr();mode="ss";stat("请点击设备选择起点");this.classList.add("active");});
 document.getElementById("btn-end").addEventListener("click",function(){if(!st){stat("请先选择起点");return;}mode="se";stat("请点击设备选择终点");this.classList.add("active");});
 document.getElementById("btn-clear").addEventListener("click",function(){clr();if(cy)cy.fit();});
}
function clr(){st=null;en=null;mode="n";if(cy)cy.elements().removeClass("ph pn");stat("点击[选起点]->点设备");document.getElementById("btn-start").classList.remove("active");document.getElementById("btn-end").classList.remove("active");document.getElementById("path-display").innerHTML="";
 var nf=document.getElementById("device-info");nf.innerHTML='<p style="color:#888;padding:6px;font-size:12px">点击设备查看详情</p>';}
function stat(s){document.getElementById("status").textContent=s;}
document.addEventListener("DOMContentLoaded",function(){init("vid");setup();});
</script>
</body>
</html>
